# Default values for observatory-config.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: starwitorg/observatory-config
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ${project.version}

nameOverride: ""
fullnameOverride: "observatory-config"

app:
  contextPath: ""
  observatoryUrl: ""

# ValKey/Redis message bus for the SAE visualizer live-tracking streams.
# Point this at an external ValKey/Redis instance reachable from the pod.
redis:
  enabled: false
  host: valkey
  port: 6379
  # Prefix of the ValKey/Redis stream that carries still frames for the "renew image" feature.
  frameStreamPrefix: saeapi-frame

auth:
  enabled: true
  keycloakRealmUrlInternal: http://internal-hostname/realms/observatory-config
  keycloakRealmUrlExternal: https://external-hostname/realms/observatory-config
  clientId: observatory-config
  clientSecret: observatory-config # TODO get from secret

# Data base configuration
database:
  internal: true
  name: observatory-config
  username: observatory-config
  password: observatory-config
  # Partition management for the recorded detection data
  partitionManagement:
    # How long recorded data is kept before its partition is dropped
    retentionTime: 2d
    # Time range covered by a single partition
    partitionRangeDuration: 6h
    # Time of day (UTC) the very first partition starts at - determines all following partition bounds
    partitionInitTimeUTC: "00:00"
    # How often partitions are created/dropped
    maintenanceInterval: 1h

# extraEnv: |
#   - name: JAVA_TOOL_OPTIONS
#     value: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=5000
#   - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY
#     value: INFO
#   - name: LOGGING_LEVEL_ROOT
#     value: DEBUG

ingress:
  enabled: true
  annotations: 
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: spc.data-wolfsburg.de
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: 
    - secretName: spc.data-wolfsburg.de
      hosts:
        - spc.data-wolfsburg.de

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

resources:
  limits:
    memory: "1000Mi"
