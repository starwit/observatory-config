name: observatory-config

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: observatoryconfig
      POSTGRES_USER: observatoryconfig
      POSTGRES_PASSWORD: observatoryconfig
      PGDATA: /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U observatoryconfig']
      interval: 5s
      timeout: 60s
      retries: 30
    volumes:
      - db:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  # ValKey/Redis message bus for the SAE visualizer live-tracking streams
  valkey:
    image: valkey/valkey:9
    command: valkey-server --port 6379 --replicaof no one
    ports:
      - "6379:6379"


volumes:
  db:
