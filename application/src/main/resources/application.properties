spring.banner.location=classpath:banner.txt
server.servlet.context-path=/observatory-config
rest.base-path=/api
server.port=8081
server.compression.enabled=true

# Max upload file size
server.tomcat.max-swallow-size=4MB
spring.servlet.multipart.max-file-size=4MB

# actuator
management.endpoints.web.base-path=/monitoring
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=*


# show full git properties
management.info.git.mode=full

# Postgres
spring.datasource.hikari.connection-timeout=10000
#spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5433/observatoryconfig
spring.jpa.hibernate.naming.physical-strategy=de.starwit.persistence.config.DatabasePhysicalNamingStrategy
spring.datasource.username=observatoryconfig
spring.datasource.password=observatoryconfig
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.data.rest.detection-strategy=annotated
#spring.jpa.hibernate.ddl-auto=create

# Flyway
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}
spring.flyway.url=${spring.datasource.url}
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.encoding=UTF-8
spring.flyway.placeholder-replacement=false

# Partition management
# How long recorded data is kept before its partition is dropped
partition.management.retentionTime=1d
# Time range covered by a single partition
partition.management.partitionRangeDuration=1d
# Time of day (UTC) the very first partition starts at - determines all following partition bounds
partition.management.partitionInitTimeUTC=00:00
# How often partitions are created/dropped
partition.management.maintenanceInterval=1h

# Detection object-count histogram: number of buckets the recorded interval is split into
detection.histogram.max-buckets=200

# OpenApi
springdoc.swagger-ui.csrf.enabled=true

# observatory connection
observatory.url=http://localhost:8082/observatory

# SAE visualizer - Redis/ValKey connection for live tracking streams
# Set spring.redis.enabled=false to disable the Redis stream listener (e.g. when no
# ValKey/Redis broker is available); the visualizer REST/websocket endpoints stay
# up but report no live streams.
spring.data.redis.active=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
#spring.data.redis.password=yourpassword
spring.data.redis.maxStreamAge=1s

# Prefix of the Valkey/Redis stream that carries still frames for the "renew image" feature. 
spring.data.redis.frame-stream-prefix=saeapi-frame

