name: Build and publish latest image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  IMAGE_NAME: observatory-config
  DOCKERHUB_USERNAME: starwit
  DOCKERHUB_ORG: starwitorg  

jobs:
  build:
    name: "Build and publish with build number"
    runs-on: [self-hosted, linux, X64]

    steps:
    - name: checkout
      uses: actions/checkout@v4 

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        distribution: "temurin"
        java-version: 25

    - name: Set up Maven
      uses: stCarolas/setup-maven@v4.5
      with:
        maven-version: 3.9.2

    - name: setup node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: npm install
      run: |
        if [ -d "webclient/app" ]; then
          cd webclient/app
          npm install
        fi   

    - name: Build with Maven
      run: mvn clean -B package -P frontend --file pom.xml --settings .github/workflows/settings.xml
      env:
         CI: false
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: get version from pom.xml
      id: get-version
      run: |
        echo "VERSION_BUILD=$( mvn help:evaluate -Dexpression=project.version -q -DforceStdout --settings .github/workflows/settings.xml )"  >> "$GITHUB_ENV"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
   
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./dockerfile
        sbom: true
        provenance: mode=max
        push: true
        tags: ${{ env.DOCKERHUB_ORG }}/${{ env.IMAGE_NAME }}:${{ env.VERSION_BUILD }}-${{ github.run_number }}
