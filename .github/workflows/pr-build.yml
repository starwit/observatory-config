name: PR Build

# PR build

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

# just runs Maven, NPM and Docker build
jobs:
  build:
    name: "Install software"
    runs-on: [self-hosted, linux, X64]

    steps:
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        distribution: "temurin"
        java-version: 25

    - name: Set up Maven
      uses: stCarolas/setup-maven@v5
      with:
         maven-version: 3.9.2        

    - name: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: "0"

    - name: setup node
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: npm install
      run: |
        if [ -d "webclient/app" ]; then
          cd webclient/app
          npm install
        fi

    - name: Build with Maven
      run: mvn clean -B package -P frontend --file pom.xml --settings .github/workflows/settings.xml
      env:
         CI: false
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checks:
    name: "Checks"
    needs: build
    runs-on: [self-hosted, linux, X64]

    steps:
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        distribution: "temurin"
        java-version: 25

    - name: Set up Maven
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: 3.9.2
    
    - name: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: "0"

    - name: template helm chart with Maven
      run: |
        mvn validate -pl application

    - name: get helm
      uses: azure/setup-helm@v4

    - name: run helm dependency update
      working-directory: application/target/helm/observatory-config
      run: helm dep update

    - name: run helm template
      working-directory: application/target/helm
      run: helm template observatory-config

