# is only required for direct test executing.
rest.base-path=/api

# disable Redis for tests
spring.data.redis.active=false

# actuator
management.endpoints.web.base-path=/monitoring
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=*

# show full git properties
management.info.git.mode=full

# h2
spring.datasource.url=jdbc:h2:mem:smartparkingconfig;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.locations=classpath:db/test
spring.jpa.show-sql=true
spring.datasource.username=smartparkingconfig
spring.datasource.password=smartparkingconfig

# required by ObservatoryService constructor
observatory.url=http://localhost:8082/observatory

